spring:
  datasource:
    url: jdbc:h2:mem:fintracktest;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  security:
    jwt:
      secret: test-secret-key-for-unit-tests-only-256bits
      expiration: 900000
      refresh-expiration: 604800000
