spring:
  datasource:
    url: jdbc:h2:mem:fintracktest;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/h2
  mail:
    host: localhost
    port: 2525
    test-connection: false

app:
  security:
    jwt:
      secret: test-secret-key-for-unit-tests-only-256bits
      expiration: 900000
      refresh-expiration: 604800000
